<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - 饮食记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #FFE3E3 0%, #FFF5F5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 8px 32px rgba(255, 107, 107, 0.15);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo .emoji {
            font-size: 56px;
            margin-bottom: 12px;
        }
        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }
        .logo p {
            font-size: 14px;
            color: #999;
            margin-top: 4px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
        }
        .input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .input:focus {
            outline: none;
            border-color: #FF6B6B;
        }
        
        .submit-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255, 107, 107, 0.3);
            transition: transform 0.2s;
            margin-top: 8px;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: #999;
        }
        .link a {
            color: #FF6B6B;
            text-decoration: none;
            font-weight: 500;
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <div class="emoji">🍽️</div>
            <h1>加入我们</h1>
            <p>创建账号开始记录</p>
        </div>
        
        <div class="input-group">
            <label>用户名</label>
            <input type="text" class="input" id="username" placeholder="2-20个字符" maxlength="20">
        </div>
        
        <div class="input-group">
            <label>邮箱</label>
            <input type="email" class="input" id="email" placeholder="用于接收每日汇总">
        </div>
        
        <div class="input-group">
            <label>密码</label>
            <input type="password" class="input" id="password" placeholder="至少4个字符">
        </div>
        
        <button class="submit-btn" id="submitBtn" onclick="doRegister()">注册</button>
        
        <div class="link">
            已有账号？<a href="/login">立即登录</a>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doRegister();
        });
        
        async function doRegister() {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !email || !password) {
                showToast('请填写用户名、邮箱和密码');
                return;
            }
            if (username.length < 2 || username.length > 20) {
                showToast('用户名需要2-20个字符');
                return;
            }
            if (email.indexOf('@') === -1) {
                showToast('请输入有效的邮箱地址');
                return;
            }
            if (password.length < 4) {
                showToast('密码至少4个字符');
                return;
            }
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, email, password})
                });
                const data = await res.json();
                
                if (data.success) {
                    showToast('✨ 注册成功！');
                    setTimeout(() => window.location.href = '/', 500);
                } else {
                    showToast(data.message || '注册失败');
                    btn.disabled = false;
                    btn.textContent = '注册';
                }
            } catch (err) {
                showToast('网络错误，请重试');
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
