<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>添加记录 - 饮食记录</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            display: flex;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(255, 107, 107, 0.3);
        }
        .header-back {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-decoration: none;
        }
        .header-title {
            flex: 1;
            color: white;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            padding-right: 44px;
        }
        
        .main {
            padding: 72px 16px 100px;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* 照片上传 */
        .photo-upload {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .upload-area {
            border: 2px dashed #FFE3E3;
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:active {
            border-color: #FF6B6B;
            background: #FFF5F5;
        }
        .upload-area .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .upload-area p {
            color: #999;
            font-size: 14px;
        }
        .upload-area .highlight {
            color: #FF6B6B;
            font-weight: 500;
        }
        .upload-input {
            display: none;
        }
        
        .photo-preview {
            display: none;
            position: relative;
        }
        .photo-preview img {
            width: 100%;
            border-radius: 12px;
        }
        .photo-preview .remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border: none;
        }
        
        /* 表单 */
        .form-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .form-label {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            display: block;
        }
        
        .name-input, .food-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .name-input:focus, .food-input:focus {
            outline: none;
            border-color: #FF6B6B;
        }
        
        /* 分类选择 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .category-item {
            padding: 14px 8px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            background: #f8f8f8;
        }
        .category-item .emoji {
            font-size: 24px;
            margin-bottom: 4px;
            display: block;
        }
        .category-item .label {
            font-size: 12px;
            font-weight: 500;
            color: #666;
        }
        .category-item.selected {
            border-color: #FF6B6B;
            background: #FFF5F5;
        }
        .category-item.selected .label {
            color: #FF6B6B;
        }
        
        /* 备注 */
        .notes-input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            min-height: 80px;
        }
        .notes-input:focus {
            outline: none;
            border-color: #FF6B6B;
        }
        
        /* 提交按钮 */
        .submit-btn {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            max-width: 568px;
            margin: 0 auto;
            height: 50px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s;
        }
        .submit-btn:active {
            transform: scale(0.98);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* Toast提示 */
        .toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="/" class="header-back">←</a>
        <div class="header-title">记录饮食</div>
    </header>
    
    <main class="main">
        <!-- 照片上传 -->
        <div class="photo-upload">
            <div class="upload-area" id="uploadArea">
                <div class="icon">📷</div>
                <p><span class="highlight">点击上传</span> 照片</p>
                <p style="font-size:12px;margin-top:4px;">支持 JPG、PNG、GIF 格式</p>
                <input type="file" class="upload-input" id="photoInput" accept="image/*">
            </div>
            <div class="photo-preview" id="photoPreview">
                <img id="previewImg" src="" alt="预览">
                <button class="remove-btn" id="removePhoto">×</button>
            </div>
        </div>
        
        <!-- 食物名称 -->
        <div class="form-section">
            <label class="form-label">🍽️ 今天吃了什么？</label>
            <input type="text" class="food-input" id="foodName" placeholder="输入食物名称，如：番茄炒蛋" maxlength="100">
        </div>
        
        <!-- 分类 -->
        <div class="form-section">
            <label class="form-label">🏷️ 分类</label>
            <div class="category-grid">
                <div class="category-item" data-category="breakfast">
                    <span class="emoji">🌅</span>
                    <span class="label">早餐</span>
                </div>
                <div class="category-item selected" data-category="lunch">
                    <span class="emoji">☀️</span>
                    <span class="label">午餐</span>
                </div>
                <div class="category-item" data-category="dinner">
                    <span class="emoji">🌙</span>
                    <span class="label">晚餐</span>
                </div>
                <div class="category-item" data-category="snack">
                    <span class="emoji">🍰</span>
                    <span class="label">零食</span>
                </div>
            </div>
        </div>
        
        <!-- 备注 -->
        <div class="form-section">
            <label class="form-label">📝 备注（可选）</label>
            <textarea class="notes-input" id="notes" placeholder="可以写写口味、感受等..."></textarea>
        </div>
    </main>
    
    <button class="submit-btn" id="submitBtn">保存记录</button>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // 分类选择
        document.querySelectorAll('.category-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.category-item').forEach(i => i.classList.remove('selected'));
                item.classList.add('selected');
            });
        });
        
        // 照片上传
        const uploadArea = document.getElementById('uploadArea');
        const photoInput = document.getElementById('photoInput');
        const photoPreview = document.getElementById('photoPreview');
        const previewImg = document.getElementById('previewImg');
        const removePhoto = document.getElementById('removePhoto');
        
        uploadArea.addEventListener('click', () => photoInput.click());
        
        photoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });
        
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                uploadArea.style.display = 'none';
                photoPreview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        removePhoto.addEventListener('click', () => {
            photoInput.value = '';
            previewImg.src = '';
            uploadArea.style.display = 'block';
            photoPreview.style.display = 'none';
        });
        
        // Toast提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        // 提交
        document.getElementById('submitBtn').addEventListener('click', async () => {
            const foodName = document.getElementById('foodName').value.trim();
            if (!foodName) { showToast('请输入食物名称'); return; }
            
            const selectedCategory = document.querySelector('.category-item.selected');
            const category = selectedCategory ? selectedCategory.dataset.category : 'snack';
            const notes = document.getElementById('notes').value.trim();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '保存中...';
            
            const formData = new FormData();
            formData.append('food_name', foodName);
            formData.append('category', category);
            formData.append('notes', notes);
            
            const photoFile = photoInput.files[0];
            if (photoFile) formData.append('photo', photoFile);
            
            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    showToast('✨ 保存成功！');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    showToast(data.message || '保存失败');
                    submitBtn.disabled = false;
                    submitBtn.textContent = '保存记录';
                }
            } catch (err) {
                showToast('网络错误，请重试');
                submitBtn.disabled = false;
                submitBtn.textContent = '保存记录';
            }
        });
    </script>
</body>
</html>
