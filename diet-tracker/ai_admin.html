<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 管理后台 - 饮食记录</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 32px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            color: white;
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }
        .result {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            background: #fafafa;
            display: none;
        }
        .result.show { display: block; }
        .result.success { background: #E8F5E9; color: #2E7D32; }
        .result.error { background: #FFEBEE; color: #C62828; }
        .status {
            margin-top: 24px;
            padding: 16px;
            border-radius: 12px;
            background: #f5f5f5;
        }
        .status h3 { margin-bottom: 12px; color: #333; }
        .status p { margin: 6px 0; color: #666; font-size: 14px; }
        .status strong { color: #FF6B6B; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ AI 管理后台</h1>
        <p class="subtitle">饮食记录网站 · 手动邮件发送</p>
        
        <button class="btn btn-primary" onclick="sendDigest()">
            📧 发送今日汇总邮件
        </button>
        
        <button class="btn btn-secondary" onclick="checkStatus()">
            📊 查看当前状态
        </button>
        
        <div class="result" id="result"></div>
        
        <div class="status" id="status">
            <h3>📊 当前状态</h3>
            <p>用户总数：<strong id="userCount">-</strong></p>
            <p>今日记录：<strong id="todayCount">-</strong></p>
            <p>总记录数：<strong id="totalCount">-</strong></p>
        </div>
    </div>
    
    <script>
        const API_KEY = 'admin-secret-key';
        
        async function sendDigest() {
            const result = document.getElementById('result');
            result.className = 'result';
            result.textContent = '⏳ 正在发送...';
            result.classList.add('show');
            
            try {
                const res = await fetch(`/api/send-digest?key=${API_KEY}`, { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    result.className = 'result success show';
                    result.textContent = '✅ ' + data.message;
                } else {
                    result.className = 'result error show';
                    result.textContent = '❌ ' + data.message;
                }
            } catch (err) {
                result.className = 'result error show';
                result.textContent = '❌ 网络错误';
            }
        }
        
        async function checkStatus() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                
                document.getElementById('userCount').textContent = data.userCount || 0;
                document.getElementById('todayCount').textContent = data.todayCount || 0;
                document.getElementById('totalCount').textContent = data.totalCount || 0;
            } catch (err) {
                alert('获取状态失败');
            }
        }
        
        checkStatus();
    </script>
</body>
</html>
